{% extends 'base.html' %}
{% block content %}
<div class="page-card auth-card">
  <h1>{% if action == 'add' %}Додати книжку{% else %}Редагувати книжку{% endif %}</h1>
  <form method="post" class="auth-form">
    {% if action == 'add' %}
      <label>ID</label>
      <input type="text" name="id" required>
    {% else %}
      <p><strong>ID:</strong> {{ book.id }}</p>
    {% endif %}

    <label>Назва</label>
    <input type="text" name="title" value="{{ book.title if book else '' }}" required>

    <label>Автор</label>
    <input type="text" name="author" value="{{ book.author if book else '' }}" required>

    <label>Жанр</label>
    <input type="text" name="genre" value="{{ book.genre if book else '' }}" required>

    <label>Рік</label>
    <input type="number" name="year" value="{{ book.year if book else '' }}">

    <label>Усього копій</label>
    <input type="number" name="total_copies" value="{{ book.total_copies if book else '1' }}">

    <label>Доступні копії</label>
    <input type="number" name="available_copies" value="{{ book.available_copies if book else '1' }}">

    <label>Локація</label>
    <input type="text" name="location" value="{{ book.location if book else '' }}">

    <label>Опис</label>
    <textarea name="description">{{ book.description if book else '' }}</textarea>

    <label>Рейтинг</label>
    <input type="number" step="0.1" name="rating" value="{{ book.rating if book else '3.0' }}">

    <label>Шлях до обкладинки</label>
    <input type="text" name="avatar_book" value="{{ book.avatar_book if book else '' }}">

    <label>Шлях до файлу книги</label>
    <input type="text" name="file_content_path" value="{{ book.file_content_path if book else '' }}">

    <button type="submit">{% if action == 'add' %}Додати{% else %}Оновити{% endif %}</button>
  </form>
  <p><a href="{{ url_for('admin_books') }}">Повернутися до книжок</a></p>
</div>
{% endblock %}
