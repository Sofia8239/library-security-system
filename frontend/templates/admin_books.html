{% extends 'base.html' %}
{% block content %}
<div class="page-card">
  <h1>Book Management</h1>
  <p>
    <a href="{{ url_for('admin_add_book') }}" class="gold-button">Add Book</a>
    <a href="{{ url_for('admin_users') }}" class="outlined-btn">Users</a>
  </p>
  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Available</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      {% for book in books %}
      <tr>
        <td>{{ book.id }}</td>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.genre }}</td>
        <td>{{ book.available_copies }}</td>
        <td>{{ book.total_copies }}</td>
        <td>
          <a class="outlined-btn" href="{{ url_for('admin_edit_book', book_id=book.id) }}">Edit</a>
          <form method="post" action="{{ url_for('admin_delete_book', book_id=book.id) }}" style="display:inline-block; margin-left:8px;">
            <button type="submit" class="outlined-btn" onclick="return confirm('Delete book?')">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
