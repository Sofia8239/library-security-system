{% extends 'base.html' %}
{% block content %}
<div class="page-card">
  <h1>Welcome to SafeLibrary!</h1>
  <p>Choose an avatar for your profile</p>

  <form method="post" enctype="multipart/form-data" class="onboarding-form">
    <div class="avatar-options">
      <div class="option">
        <h3>Upload your own photo</h3>
        <input type="hidden" name="avatar_type" value="upload">
        <input type="file" name="avatar" accept="image/*" required>
        <button type="submit" class="gold-button">Upload</button>
      </div>

      <div class="option">
        <h3>Or choose from presets</h3>
        <input type="hidden" name="avatar_type" value="default">
        <div class="default-avatars">
          {% for avatar in ['owl', 'cat', 'bear', 'fox', 'raccoon'] %}
            <label class="avatar-choice">
              <input type="radio" name="default_avatar" value="{{ avatar }}" required>
              <img src="{{ url_for('assets', path='avatars/defaults/' + avatar + '.png') }}" alt="{{ avatar }}">
              <span>{{ avatar.title() }}</span>
            </label>
          {% endfor %}
        </div>
        <button type="submit" class="gold-button">Choose</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
