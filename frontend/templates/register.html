{% extends 'base.html' %}
{% block content %}
<div class="page-card auth-card">
  <h1>Register</h1>
  <p>Create a new account</p>

  <form method="post" class="auth-form">
    <label>Full Name</label>
    <input type="text" name="full_name" placeholder="Full Name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Email" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Password" required>

    <label>Phone</label>
    <input type="tel" name="phone" placeholder="+380XXXXXXXXX">

    <label>City</label>
    <input type="text" name="city" placeholder="Lviv">

    <label>Birth Date</label>
    <input type="date" name="birth_date">

    <label>Address</label>
    <input type="text" name="address" placeholder="Street, house, apartment">

    <button type="submit">Register</button>
  </form>

  <p class="small-text">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
